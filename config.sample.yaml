devices:
  - name: living_room_plug
    type: tapo
    host: 192.168.1.100
    email: ${TAPO_EMAIL}                   # or hardcode: your@email.com
    password: ${TAPO_PASSWORD}              # or hardcode: your_password

  - name: dehumidifier
    type: probreeze
    host: 192.168.1.101
    device_id: ${TUYA_DEVICE_ID}           # from Tuya IoT Platform
    local_key: ${TUYA_LOCAL_KEY}           # from Tuya IoT Platform
    # version: 3.3                        # optional, default 3.3
